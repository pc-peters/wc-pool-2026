*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden}
.app{min-height:100vh;display:flex;flex-direction:column;max-width:620px;margin:0 auto}
.app::before{content:'';position:fixed;inset:0;max-width:620px;margin:0 auto;

  pointer-events:none;z-index:0}
.header{position:sticky;top:0;z-index:100;background:rgba(14,26,20,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--cream);line-height:1}
.logo span{color:var(--gold)}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--success);text-transform:uppercase;letter-spacing:0.05em}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.pot-chip{display:flex;align-items:center;gap:5px;background:rgba(232,184,75,0.12);border:1px solid rgba(232,184,75,0.3);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--gold);font-family:'DM Mono',monospace}
.tabs{display:flex;overflow-x:auto;padding:0 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 11px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--cream)}
.header-accent{height:3px;background:linear-gradient(90deg,var(--grass) 0%,var(--gold) 50%,var(--grass) 100%);opacity:0.6}
.content{flex:1;padding:14px 14px 80px;position:relative;z-index:1}
.screen{display:none}.screen.active{display:block}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;color:var(--cream);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:8px}
.hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--cream);padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:10px;appearance:none;-webkit-appearance:none}
select option{background:#1a2820;color:var(--cream)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--grass-light),var(--grass));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:0.5px;border:1px solid rgba(255,255,255,0.15)}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--card-border);font-size:13px}
.row:last-child{border-bottom:none}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);width:20px;flex-shrink:0;text-align:right}
.rank-num.podium{color:var(--gold)}
.net-big{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;margin-left:auto;min-width:70px;text-align:right}
.net-pos{color:var(--success)}.net-neg{color:var(--danger)}
.sub-line{font-size:11px;color:var(--muted)}
.badge-neutral{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--card-border)}
.pot-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:8px;padding:10px}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.metric-value{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--cream)}
.metric-value.accent{color:var(--gold)}
.result-match-block{padding:12px 0;border-bottom:1px solid var(--card-border)}
.result-match-block:last-child{border-bottom:none}
.result-meta{font-size:10px;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace}
.result-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.result-team{font-size:14px;font-weight:600;color:var(--cream);flex:1}
.result-team.away{text-align:right}

.result-bets-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}

.result-bet-player{color:var(--cream);font-weight:500}

.fixture-home{font-weight:600;color:var(--cream);text-align:right;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

</head>

function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmt(n){return '$'+Math.abs(n).toFixed(2);}
function fmtSigned(n){return (n>=0?'+':'-')+fmt(n);}
function fmtSgtDate(d){
  const [y,m,day]=d.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt=new Date(parseInt(y),parseInt(m)-1,parseInt(day));
  return `${days[dt.getDay()]} ${parseInt(day)} ${months[parseInt(m)-1]}`;
}
function fmt12h(t){
  const [h,m]=t.split(':').map(Number);
  const ampm=h<12?'am':'pm';const h12=h===0?12:h>12?h-12:h;
  return `${h12}${m?':'+String(m).padStart(2,'0'):''}${ampm}`;
}
function getSgtToday(){

async function loadData(){
  try{
    const res=await fetch('data.json?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    state=await res.json();
    renderAll();
  }catch(e){
    document.getElementById('screen-leaderboard').innerHTML=`<div class="card"><div class="error-box">Couldn't load data.json — ${e.message}.<br><br>If you're the admin: make sure data.json sits in the same folder as this page and contains a valid state export.</div></div>`;
  }
}

function showTab(tab,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='chart')renderChart();
}

function getPlayerStats(){
  // R2-onwards betting stats only (matches dated after R1_CUTOFF)
  const stats={};
  PLAYERS.forEach(p=>{stats[p]={pts:0,paid:0,won:0};});
  Object.entries(state.results||{}).forEach(([date,dayResults])=>{
    if(date<=R1_CUTOFF)return;
    const day=state.matchDays[date];if(!day)return;
    Object.entries(dayResults).forEach(([mi,mr])=>{
      const bets=day.bets[mi]||{};
      Object.keys(bets).forEach(p=>{
        if(!stats[p])return;
        stats[p].paid+=STAKE;stats[p].pts+=mr.scores[p]||0;stats[p].won+=mr.payouts[p]||0;
      });
    });
  });
  return stats;
}

function renderLeaderboard(){
  const stats=getPlayerStats();
  const combined=p=>(R1_RESULTS[p]||0)+(stats[p].won-stats[p].paid);
  const sorted=PLAYERS.slice().sort((a,b)=>combined(b)-combined(a));
  const medals=['🥇','🥈','🥉'];

  let html=`<div class="card"><div class="card-title">💸 Wallet Ranking</div>`;
  // header
  html+=`<div style="display:grid;grid-template-columns:22px 1fr 52px 52px 58px 48px 60px;gap:5px;padding:4px 0 8px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.03em;border-bottom:1px solid var(--card-border);margin-bottom:4px">
    <div></div><div>Player</div>
    <div style="text-align:right">R1</div>
    <div style="text-align:right">R2</div>
    <div style="text-align:right;color:var(--gold)">R1+R2</div>
    <div style="text-align:right">Buy-in</div>
    <div style="text-align:right">Total</div>
  </div>`;
  html+=sorted.map((p,i)=>{
    const s=stats[p];
    const r2=s.won-s.paid;
    const r1=R1_RESULTS[p]||0;
    const r1r2=r1+r2;
    const total=r1+r2-BUYIN;
    return `<div style="display:grid;grid-template-columns:22px 1fr 52px 52px 58px 48px 60px;gap:5px;align-items:center;padding:8px 0;border-bottom:1px solid var(--card-border)">
      <div class="rank-num ${i<3?'podium':''}" style="width:auto">${i<3?medals[i]:i+1}</div>
      <div style="display:flex;align-items:center;gap:6px;min-width:0">
        <div class="avatar" style="width:26px;height:26px;font-size:10px">${ini(p)}</div>
        <div style="font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p}</div>
      </div>
      <div class="net-amt ${r1>=0?'net-pos':'net-neg'}" style="min-width:0;font-size:10px;opacity:0.7">${fmtSigned(r1)}</div>
      <div class="net-amt ${r2>=0?'net-pos':'net-neg'}" style="min-width:0;font-size:11px">${fmtSigned(r2)}</div>
      <div class="net-amt ${r1r2>=0?'net-pos':'net-neg'}" style="min-width:0;font-weight:700">${fmtSigned(r1r2)}</div>
      <div class="net-amt net-neg" style="min-width:0;font-size:10px;opacity:0.7">-$50</div>
      <div class="net-amt ${total>=0?'net-pos':'net-neg'}" style="min-width:0">${fmtSigned(total)}</div>
    </div>`;
  }).join('');
  html+=`<div style="font-size:10px;color:var(--muted);margin-top:10px;line-height:1.5">Ranked by <strong style="color:var(--gold)">R1+R2</strong>. R1 = frozen Round 1 net (now in the pot). R2 = live betting. Buy-in = $50 each into the pot. Total = R1 + R2 − buy-in.</div>`;
  html+=`</div>`;

  const pot=state.pot||0;
  html+=`<div class="card"><div class="card-title">🏆 Champion Pot</div>
    <div class="pot-summary">
      <div class="metric"><div class="metric-label">Total pot</div><div class="metric-value accent">${fmt(pot)}</div></div>
      <div class="metric"><div class="metric-label">Winner (60%)</div><div class="metric-value">${fmt(pot*0.6)}</div></div>
      <div class="metric"><div class="metric-label">Groups (40%)</div><div class="metric-value">${fmt(pot*0.4)}</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted)">60% to whoever predicts the champion · 40% to top 3 group predictors</div>
  </div>`;
  if(state.generated)html+=`<div class="updated-line">Last updated: ${state.generated}</div>`;
  document.getElementById('screen-leaderboard').innerHTML=html;
  document.getElementById('pot-mini').textContent=fmt(pot);
}

// Build per-match cumulative wallet timeline
function buildTimeline(){
  // Ordered list of calculated matches, chronological by schedule order
  const order=[];
  SCHEDULE.forEach(sm=>{
    Object.keys(state.results||{}).forEach(date=>{
      const day=state.matchDays[date];if(!day)return;
      day.matches.forEach((m,mi)=>{
        if(m.home===sm.home&&m.away===sm.away&&date===sm.sgtDate&&state.results[date][mi]){
          order.push({date,mi,label:`${m.home.slice(0,3).toUpperCase()}-${m.away.slice(0,3).toUpperCase()}`,m});
        }
      });
    });
  });
  // cumulative net per player
  const cum={};PLAYERS.forEach(p=>cum[p]=0);
  const series={};PLAYERS.forEach(p=>series[p]=[0]); // start at 0
  const labels=['Start'];
  order.forEach(o=>{
    const mr=state.results[o.date][o.mi];
    const bets=state.matchDays[o.date].bets[o.mi]||{};
    PLAYERS.forEach(p=>{
      if(bets[p]){
        cum[p]+=(mr.payouts[p]||0)-STAKE;
      }
      series[p].push(parseFloat(cum[p].toFixed(2)));
    });
    labels.push(o.label);
  });
  return {labels,series};
}

function renderChart(){
  const {labels,series}=buildTimeline();
  if(labels.length<=1){
    document.getElementById('screen-chart').innerHTML=`<div class="card"><div class="card-title">📈 Wallet Trend</div><p class="hint">No matches calculated yet. The chart will populate as results come in.</p></div>`;
    return;
  }
  const W=Math.max(560,labels.length*60),H=320,padL=44,padR=16,padT=20,padB=46;
  let allVals=[];PLAYERS.forEach(p=>allVals=allVals.concat(series[p]));
  const minV=Math.min(...allVals,-2),maxV=Math.max(...allVals,2);
  const range=maxV-minV||1;
  const x=i=>padL+(i/(labels.length-1))*(W-padL-padR);
  const y=v=>padT+(1-(v-minV)/range)*(H-padT-padB);

  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  // zero line
  svg+=`<line x1="${padL}" y1="${y(0)}" x2="${W-padR}" y2="${y(0)}" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,3"/>`;
  svg+=`<text x="${padL-6}" y="${y(0)+3}" fill="var(--muted)" font-size="9" text-anchor="end" font-family="DM Mono">$0</text>`;
  // y gridlines
  [maxV,minV].forEach(v=>{
    svg+=`<text x="${padL-6}" y="${y(v)+3}" fill="var(--muted)" font-size="9" text-anchor="end" font-family="DM Mono">${v>=0?'+':'-'}$${Math.abs(v).toFixed(0)}</text>`;
  });
  // x labels
  labels.forEach((lb,i)=>{
    if(labels.length>14 && i%2!==0 && i!==labels.length-1)return;
    svg+=`<text x="${x(i)}" y="${H-padB+16}" fill="var(--muted)" font-size="8" text-anchor="middle" font-family="DM Mono" transform="rotate(35 ${x(i)} ${H-padB+16})">${lb}</text>`;
  });
  // lines
  PLAYERS.forEach(p=>{
    const pts=series[p].map((v,i)=>`${x(i)},${y(v)}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="${PLAYER_COLORS[p]}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`;
    // end dot
    const li=series[p].length-1;
    svg+=`<circle cx="${x(li)}" cy="${y(series[p][li])}" r="3" fill="${PLAYER_COLORS[p]}"/>`;
  });
  svg+=`</svg>`;

  const legend=PLAYERS.map(p=>`<div class="legend-item"><span class="legend-swatch" style="background:${PLAYER_COLORS[p]}"></span>${p}</div>`).join('');
  document.getElementById('screen-chart').innerHTML=`<div class="card">
    <div class="card-title">📈 Wallet Trend <span style="font-size:11px;color:var(--muted);font-family:'DM Sans'">cumulative net, per match</span></div>
    <p class="hint">Each player's running profit/loss after every calculated match. Above the dotted line = in profit.</p>
    <div id="chart-wrap">${svg}</div>
    <div class="chart-legend">${legend}</div>
  </div>`;
}

function renderResults(){
  const dates=Object.keys(state.results||{}).sort().reverse();
  if(!dates.length){
    document.getElementById('screen-results').innerHTML=`<div class="card"><div class="card-title">📊 Results</div><p class="hint">No results yet.</p></div>`;
    return;
  }
  let html=`<div class="card"><div class="card-title">📊 Match Results <span class="sgt-badge">SGT</span></div>
    <select id="result-date-select" onchange="renderResultDay()">
      ${dates.map((d,i)=>`<option value="${d}"${i===0?' selected':''}>${fmtSgtDate(d)}</option>`).join('')}
    </select>
    <div id="result-day-content"></div>
  </div>`;
  document.getElementById('screen-results').innerHTML=html;
  renderResultDay();
}

function renderResultDay(){
  const date=document.getElementById('result-date-select').value;
  const day=state.matchDays[date],dayResults=state.results[date];
  const schedForDate=SCHEDULE.filter(m=>m.sgtDate===date);
  let html='';
  day.matches.forEach((m,mi)=>{
    const r=dayResults[mi];if(!r)return;
    const bets=day.bets[mi]||{};
    const bettors=Object.keys(bets).sort((a,b)=>(r.scores[b]||0)-(r.scores[a]||0));
    const sched=schedForDate.find(s=>s.home===m.home&&s.away===m.away);
    const betGrid=bettors.length?`<div class="result-bets-grid">${bettors.map(p=>{
      const b=bets[p],s=r.scores[p],pay=r.payouts[p]||0;
      const cls=s>=10?'pts-10':s>=5?'pts-5':s>=4?'pts-4':s>=1?'pts-1':'pts-0';
      return `<div class="result-bet-item">
        <span class="result-bet-player">${p} <span style="color:var(--muted);font-weight:400">${b.home}-${b.away}</span></span>
        <span class="result-bet-detail ${cls}">${s}p · ${fmt(pay)}</span>
      </div>`;
    }).join('')}</div>`:`<p class="result-no-bets">No bets on this match</p>`;
    html+=`<div class="result-match-block">
      <div class="result-meta">${sched?fmt12h(sched.sgtTime)+' SGT · ':''}${m.venue||''} ${m.group?'· Group '+m.group:''}</div>
      <div class="result-header">
        <span class="result-team">${m.home}</span>
        <span class="result-score">${r.result.home}–${r.result.away}</span>
        <span class="result-team away">${m.away}</span>
      </div>
      ${betGrid}
    </div>`;
  });
  document.getElementById('result-day-content').innerHTML=html;
}

function renderSchedule(){
  const today=getSgtToday();
  const upcoming=SCHEDULE.filter(m=>m.sgtDate>=today);
  const byDate={};
  upcoming.forEach(m=>{if(!byDate[m.sgtDate])byDate[m.sgtDate]=[];byDate[m.sgtDate].push(m);});
  const dates=Object.keys(byDate).sort();
  let html=`<div class="card"><div class="card-title">📅 Upcoming Matches <span class="sgt-badge">SGT</span></div>`;
  if(!dates.length){html+=`<p class="hint">No more group stage matches scheduled.</p>`;}
  else{
    html+=dates.map(d=>{
      const matches=byDate[d];
      const isToday=d===today;
      return `<div class="day-block">
        <div class="day-label">${fmtSgtDate(d)} ${isToday?'<span style="background:var(--gold);color:var(--ink);font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;font-family:DM Sans">TODAY</span>':''}<span class="match-count">${matches.length} match${matches.length>1?'es':''}</span></div>
        ${matches.map(m=>`<div class="fixture-row">
          <span class="fixture-group">Grp ${m.group}</span>
          <div class="fixture-teams"><span class="fixture-home">${m.home}</span><span class="fixture-vs">vs</span><span class="fixture-away">${m.away}</span></div>
          <span class="fixture-time">${fmt12h(m.sgtTime)}</span>
        </div>`).join('')}
      </div>`;
    }).join('');
  }
  html+=`</div>`;
  document.getElementById('screen-schedule').innerHTML=html;
}

function renderPredictions(){
  let html=`<div class="card"><div class="card-title">🏆 Tournament Winner Picks</div>`;
  html+=PLAYERS.map(p=>`<div class="row">
    <div class="avatar">${ini(p)}</div>
    <div style="flex:1;margin-left:6px;font-size:13px;font-weight:600">${p}</div>
    <span class="badge-neutral">${state.setup?.[p]?.winner||'—'}</span>
  </div>`).join('');
  html+=`</div>`;
  html+=`<div class="card"><div class="card-title">📋 Group Predictions</div>`;
  html+=GROUPS_2026.map(g=>{
    const saved=state.groupPredictions?.[g]||{};
    return `<div style="margin-bottom:14px">
      <div class="section-sep">Group ${g}: ${TEAMS_2026[g].join(' · ')}</div>
      <table class="group-table">
        <thead><tr><th>Player</th><th>1st</th><th>2nd</th></tr></thead>
        <tbody>${PLAYERS.map(p=>{
          const ps=saved[p]||{};
          return `<tr><td style="font-weight:600">${p}</td><td>${ps.first||'-'}</td><td>${ps.second||'-'}</td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
  html+=`</div>`;
  document.getElementById('screen-predictions').innerHTML=html;
}

function renderAll(){
  renderLeaderboard();
  renderResults();
  renderSchedule();
  renderPredictions();
}

loadData();
</script>
</body>
</html>
